  - jekyll-remote-theme

url: https://takihito.github.io
baseurl: /ghub-desk

nav:
  - title: Home
    url: /ghub-desk/
  - title: Installation
    url: /ghub-desk/installation
  - title: Usage
    url: /ghub-desk/usage
  - title: MCP Server
